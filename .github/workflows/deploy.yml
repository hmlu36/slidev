name: Deploy pages

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Setup @antfu/ni
        run: npm i -g @antfu/ni

      - name: Install dependencies
        run: nci

      - name: Install dependencies
        run: npm install

      - name: Install slidev
        run: npm i -g @slidev/cli@latest

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install fonttools
        run: |
          pip install fonttools brotli
          pip install --upgrade fonttools[woff]

      - name: Generate fonts (BEFORE BUILD)
        run: |
          python fonts/toolkit/findUniqueChar.py
          
          echo "Content of unique_chars.txt:"
          cat fonts/toolkit/unique_chars.txt
          
          pyftsubset fonts/toolkit/CWTEX-K.ttf \
                  --text-file=fonts/toolkit/unique_chars.txt \
                  --flavor=woff2 \
                  --no-hinting \
                  --desubroutinize \
                  --layout-features='' \
                  --output-file=public/CWTEX-K.subset.woff2
          
          ls -lh public/CWTEX-K.subset.woff2

      - name: Patch CSS Path
        run: |
          sed -i "s|url([^)]*CWTEX-K.ttf[^)]*) format([^)]*)|url('/${{github.event.repository.name}}/CWTEX-K.subset.woff2') format('woff2')|g" style.css

      - name: Build
        run: |
          echo -e "y\n" | npx slidev build main.md --base /${{github.event.repository.name}}/
          touch dist/.nojekyll # 重要：繞過 Jekyll 的編譯機制

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          include-hidden-files: true

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5